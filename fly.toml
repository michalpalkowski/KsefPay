# fly.io configuration for KSeF Pay
# Deploy: fly deploy
# Logs:   fly logs

app = 'ksef-paymoney'
primary_region = 'fra'

[build]

[env]
  DATABASE_URL = "sqlite:///data/ksef.db"
  KSEF_ENVIRONMENT = "test"
  RUST_LOG = "info,ksef_core=debug,ksef_server=debug"
  SERVER_PORT = "3000"

[mounts]
  source = "ksef_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    path = "/health"
    interval = "30s"
    timeout = "5s"

[[vm]]
  memory = '1gb'
  cpus = 1
