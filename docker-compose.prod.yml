services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ksef
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ksef}
      POSTGRES_DB: ksef
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ksef"]
      interval: 5s
      timeout: 5s
      retries: 5

  ksef-server:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgres://ksef:${POSTGRES_PASSWORD:-ksef}@postgres:5432/ksef
      APP_BASE_URL: ${APP_BASE_URL}
      KSEF_ENVIRONMENT: ${KSEF_ENVIRONMENT:-test}
      CERT_STORAGE_KEY: ${CERT_STORAGE_KEY}
      KSEF_CERT_PEM: ${KSEF_CERT_PEM:-}
      KSEF_KEY_PEM: ${KSEF_KEY_PEM:-}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURITY: ${SMTP_SECURITY:-starttls}
      SMTP_AUTH: ${SMTP_AUTH:-required}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-KSeF Pay}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "3000"
      RUST_LOG: info,ksef_core=debug,ksef_server=debug

volumes:
  pgdata:
