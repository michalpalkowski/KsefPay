services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ksef
      POSTGRES_PASSWORD: ksef
      POSTGRES_DB: ksef
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ksef"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.26
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
