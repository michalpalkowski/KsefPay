{% extends "layouts/app.html" %}

{% block head %}
<title>Logowanie - KSeF Pay</title>
{% endblock %}

{% block navbar %}{% endblock %}

{% block content %}
<div class="page-card auth-card">
  <div class="page-header">
    <h1>Logowanie</h1>
    <p class="page-copy">Zaloguj sie do KSeF Pay</p>
  </div>

  {% if let Some(msg) = error %}
  <div class="alert alert-error">{{ msg }}</div>
  {% endif %}

  <form method="post" action="/login" class="auth-form">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" name="email" id="email" value="{{ email }}"
             placeholder="twoj@email.pl" required autofocus
             autocomplete="email" />
    </div>
    <div class="form-group">
      <label for="password">Haslo</label>
      <input type="password" name="password" id="password" required
             autocomplete="current-password" />
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary" style="width: 100%;">Zaloguj sie</button>
    </div>
  </form>

  <p class="page-copy" style="margin-top: 1rem; text-align: center;">
    Nie masz konta? <a href="/register">Zarejestruj sie</a>
  </p>
</div>
{% endblock %}
