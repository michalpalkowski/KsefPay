{% extends "layouts/app.html" %}

{% block head %}
<title>Nowa faktura - KSeF PayMoney</title>
{% endblock %}

{% block content %}
<div class="page-card">
  <div class="page-header">
    <h1>Nowa faktura</h1>
  </div>

  {% if let Some(msg) = error %}
  <div class="alert alert-error">{{ msg }}</div>
  {% endif %}

  <form method="post" action="/invoices" class="invoice-form">
    <fieldset>
      <legend>Dane faktury</legend>
      <div class="form-row">
        <label for="invoice_number">Numer faktury</label>
        <input type="text" name="invoice_number" id="invoice_number" placeholder="FV/2026/04/001" required />
      </div>
      <div class="form-row-group">
        <div class="form-row">
          <label for="issue_date">Data wystawienia</label>
          <input type="date" name="issue_date" id="issue_date" value="{{ today }}" required />
        </div>
        <div class="form-row">
          <label for="sale_date">Data sprzedazy</label>
          <input type="date" name="sale_date" id="sale_date" value="{{ today }}" required />
        </div>
      </div>
    </fieldset>

    <fieldset>
      <legend>Sprzedawca</legend>
      <div class="form-row">
        <label for="seller_nip">NIP</label>
        <input type="text" name="seller_nip" id="seller_nip" value="{{ default_nip }}" required />
      </div>
      <div class="form-row">
        <label for="seller_name">Nazwa firmy</label>
        <input type="text" name="seller_name" id="seller_name" required />
      </div>
      <div class="form-row">
        <label for="seller_address_line1">Adres (linia 1)</label>
        <input type="text" name="seller_address_line1" id="seller_address_line1" placeholder="ul. Testowa 1" required />
      </div>
      <div class="form-row">
        <label for="seller_address_line2">Adres (linia 2)</label>
        <input type="text" name="seller_address_line2" id="seller_address_line2" placeholder="00-001 Warszawa" required />
      </div>
    </fieldset>

    <fieldset>
      <legend>Nabywca</legend>
      <div class="form-row">
        <label for="buyer_nip">NIP</label>
        <input type="text" name="buyer_nip" id="buyer_nip" placeholder="1234567890" required />
      </div>
      <div class="form-row">
        <label for="buyer_name">Nazwa firmy</label>
        <input type="text" name="buyer_name" id="buyer_name" required />
      </div>
      <div class="form-row">
        <label for="buyer_address_line1">Adres (linia 1)</label>
        <input type="text" name="buyer_address_line1" id="buyer_address_line1" required />
      </div>
      <div class="form-row">
        <label for="buyer_address_line2">Adres (linia 2)</label>
        <input type="text" name="buyer_address_line2" id="buyer_address_line2" required />
      </div>
    </fieldset>

    <fieldset>
      <legend>Pozycja</legend>
      <div class="form-row">
        <label for="item_description">Opis uslugi/towaru</label>
        <input type="text" name="item_description" id="item_description" placeholder="Uslugi programistyczne" required />
      </div>
      <div class="form-row-group">
        <div class="form-row">
          <label for="item_quantity">Ilosc</label>
          <input type="text" name="item_quantity" id="item_quantity" value="1" required />
        </div>
        <div class="form-row">
          <label for="item_unit_price">Cena netto (PLN)</label>
          <input type="text" name="item_unit_price" id="item_unit_price" placeholder="150.00" required />
        </div>
        <div class="form-row">
          <label for="item_vat_rate">Stawka VAT</label>
          <select name="item_vat_rate" id="item_vat_rate">
            <option value="23" selected>23%</option>
            <option value="8">8%</option>
            <option value="5">5%</option>
            <option value="0">0%</option>
            <option value="zw">Zwolniony</option>
          </select>
        </div>
      </div>
    </fieldset>

    <fieldset>
      <legend>Platnosc</legend>
      <div class="form-row-group">
        <div class="form-row">
          <label for="payment_method">Metoda platnosci</label>
          <select name="payment_method" id="payment_method">
            <option value="transfer" selected>Przelew</option>
            <option value="cash">Gotowka</option>
            <option value="card">Karta</option>
          </select>
        </div>
        <div class="form-row">
          <label for="payment_deadline">Termin platnosci</label>
          <input type="date" name="payment_deadline" id="payment_deadline" value="{{ payment_deadline }}" required />
        </div>
      </div>
      <div class="form-row">
        <label for="bank_account">Numer konta bankowego</label>
        <input type="text" name="bank_account" id="bank_account" placeholder="PL12345678901234567890123456" />
      </div>
    </fieldset>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Utworz fakture</button>
      <a href="/invoices" class="btn btn-secondary">Anuluj</a>
    </div>
  </form>
</div>
{% endblock %}
