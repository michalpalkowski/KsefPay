{% extends "layouts/app.html" %}

{% block head %}
<title>Dodaj konto NIP - KSeF Pay</title>
{% endblock %}

{% block content %}
<div class="page-card">
  <div class="page-header">
    <h1>Dodaj konto NIP</h1>
    <p class="page-copy">Podaj NIP i nazwe firmy</p>
  </div>

  {% if let Some(msg) = error %}
  <div class="alert alert-error">{{ msg }}</div>
  {% endif %}

  <form method="post" action="/accounts/add">
    <div class="form-row">
      <label for="nip">NIP (10 cyfr)</label>
      <input type="text" name="nip" id="nip" value="{{ nip }}" required pattern="\d{10}" placeholder="1234567890" />
    </div>
    <div class="form-row">
      <label for="display_name">Nazwa wyświetlana</label>
      <input type="text" name="display_name" id="display_name" value="{{ display_name }}" required placeholder="Nazwa firmy Sp. z o.o." />
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Dodaj konto</button>
      <a href="/accounts" class="btn btn-secondary">Anuluj</a>
    </div>
  </form>
</div>
{% endblock %}
